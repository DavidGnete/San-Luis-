<form id="eventoForm">
  <h3>Reserva tu cupo para la Excursión al Río</h3>

  <input type="text" id="nombre" placeholder="Tu nombre" required>
  
  <input type="date" id="fechaEvento" required>
  
  <input type="number" id="personas" placeholder="Número de personas" required>
  
  <select id="plan">
    <option value="basico">Plan Básico</option>
    <option value="completo">Plan Completo</option>
    <option value="vip">Plan VIP</option>
  </select>
  
  <button type="submit">Reservar por WhatsApp</button>
</form>

<script>
  document.getElementById("eventoForm").addEventListener("submit", function(e){
    e.preventDefault();

    let telefono = "573001112233"; // número del organizador

    let nombre = document.getElementById("nombre").value;
    let fecha = document.getElementById("fechaEvento").value;
    let personas = document.getElementById("personas").value;
    let plan = document.getElementById("plan").value;

    let mensaje = `Hola, soy ${nombre}. Quiero reservar para la excursión:
- Fecha: ${fecha}
- Personas: ${personas}
- Plan elegido: ${plan}`;

    let url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;

    window.open(url, "_blank");
  });
</script>
